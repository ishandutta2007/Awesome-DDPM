<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <filter id="f1" x="0" y="0">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="800" height="200" fill="url(#grad1)" rx="15" />
  
  <!-- Abstract Diffusion Representation -->
  <g opacity="0.4">
    <circle cx="100" cy="100" r="40" fill="#ffffff" filter="url(#f1)">
      <animate attributeName="r" values="40;45;40" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="700" cy="100" r="30" fill="#ffffff" filter="url(#f1)">
      <animate attributeName="r" values="30;35;30" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" />
    </circle>
  </g>

  <text x="400" y="100" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" filter="url(#f1)">
    AWESOME DDPM
  </text>
  <text x="400" y="140" text-anchor="middle" fill="#e0e0e0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-style="italic">
    Curated List of Denoising Diffusion Probabilistic Models
  </text>
</svg>
